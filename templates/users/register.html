{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div style="max-width:400px;margin:2rem auto;">
  <div class="card">
    <h2 class="text-center mb-4">Create your account</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ form.email.value|default:"" }}" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" value="{{ form.username.value|default:"" }}" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="password_confirm" required>
      </div>
      {% if form.errors %}
        <div class="alert alert-error">{{ form.errors }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>
    <p class="text-center text-sm mt-4">
      Already have an account? <a href="/login/">Login</a>
    </p>
  </div>
</div>
{% endblock %}
