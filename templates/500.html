<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error — PolicyGen</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900&family=Lora:ital,wght@0,400;0,600;0,700&family=Courier+Prime:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lora', Georgia, serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            background: #f5f0e1;
            color: #2c1810;
        }
        .container {
            text-align: center; padding: 3rem 1rem;
            background: #f5f0e1;
            border: 2px solid #2c1810;
            border-radius: 2px;
            max-width: 480px;
            box-shadow: 3px 3px 0 rgba(44,24,16,0.15);
        }
        .error-code {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 7rem; font-weight: 900;
            color: #8b2500; line-height: 1;
            text-shadow: 2px 2px 0 rgba(139,37,0,0.15);
        }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.5rem; font-weight: 700;
            margin: 0.75rem 0 0.5rem;
        }
        p {
            font-size: 0.9375rem; color: #665544;
            margin-bottom: 2rem; line-height: 1.6;
        }
        a {
            display: inline-block;
            padding: 0.65rem 1.75rem;
            background: #2c1810; color: #b8860b;
            text-decoration: none; border-radius: 2px;
            font-family: 'Lora', Georgia, serif;
            font-size: 0.9375rem; font-weight: 600;
            box-shadow: 0 2px 0 rgba(44,24,16,0.3);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        a:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 0 rgba(44,24,16,0.3);
        }
        a:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 rgba(44,24,16,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">500</div>
        <h1>Something Went Wrong</h1>
        <p>We're experiencing a technical difficulty in our print shop. Our typesetters are working to resolve it. Please try again shortly.</p>
        <a href="/">Return Home</a>
    </div>
</body>
</html>
